<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Language Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@300;400;600&family=Noto+Sans+SC&family=Noto+Sans+JP&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #1a1f2e;
    --surface:  #242b3d;
    --card:     #2d3550;
    --border:   #3d4a6a;
    --chalk:    #eef0f5;
    --muted:    #8a95b0;
    --accent:   #f0c040;
    --zh:       #e87040;
    --ja:       #c45090;
    --es:       #40b070;
    --radius:   14px;
    --transition: 0.25s ease;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--bg);
    color: var(--chalk);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .wrapper {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 820px;
    padding: 32px 20px 60px;
  }
  header { text-align: center; margin-bottom: 36px; }
  .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-bottom: 10px;
  }
  .logo-icon {
    width: 48px; height: 48px;
    background: var(--accent);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.2rem);
    font-weight: 700;
  }
  .tagline { color: var(--muted); font-size: 0.95rem; font-weight: 300; }

  .direction-bar {
    display: flex;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    padding: 4px;
    gap: 4px;
    width: fit-content;
    margin: 0 auto 28px;
  }
  .dir-btn {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    padding: 8px 18px;
    border-radius: 50px;
    cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .dir-btn.active { background: var(--accent); color: #1a1f2e; }

  .lang-select-row {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .lang-chip {
    border: 1.5px solid var(--border);
    background: transparent;
    border-radius: 50px;
    color: var(--muted);
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 7px 16px;
    transition: var(--transition);
  }
  .lang-chip[data-lang="zh"].active { border-color: var(--zh); background: rgba(232,112,64,.15); color: var(--zh); }
  .lang-chip[data-lang="ja"].active { border-color: var(--ja); background: rgba(196,80,144,.15); color: var(--ja); }
  .lang-chip[data-lang="es"].active { border-color: var(--es); background: rgba(64,176,112,.15); color: var(--es); }

  .search-box { margin-bottom: 10px; }
  .search-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .search-row { display: flex; gap: 10px; }
  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    color: var(--chalk);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 1.15rem;
    padding: 14px 18px;
    outline: none;
    transition: var(--transition);
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(240,192,64,.12); }
  .search-btn {
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #1a1f2e;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    padding: 14px 24px;
    transition: var(--transition);
    white-space: nowrap;
  }
  .search-btn:hover { background: #f5cc55; transform: translateY(-1px); }
  .search-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .hints {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 24px;
    align-items: center;
  }
  .hint-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 50px;
    color: var(--muted);
    cursor: pointer;
    font-size: 0.82rem;
    padding: 5px 14px;
    transition: var(--transition);
  }
  .hint-pill:hover { border-color: var(--accent); color: var(--accent); }

  .status { text-align: center; color: var(--muted); font-size: 0.9rem; padding: 20px 0 10px; min-height: 40px; }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2.5px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .results { display: flex; flex-direction: column; gap: 16px; }

  .en-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 26px;
    position: relative;
  }
  .en-card::before {
    content: 'ENGLISH';
    position: absolute;
    top: -10px; left: 18px;
    background: var(--accent);
    color: #1a1f2e;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    padding: 2px 10px;
    border-radius: 50px;
  }
  .word-main {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .pos-badge {
    display: inline-block;
    background: rgba(240,192,64,.15);
    color: var(--accent);
    border-radius: 6px;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 3px 10px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .pronunciation-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .phonetic { color: var(--muted); font-size: 1rem; font-style: italic; }
  .speak-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 50%;
    color: var(--chalk);
    cursor: pointer;
    width: 34px; height: 34px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    transition: var(--transition);
    flex-shrink: 0;
  }
  .speak-btn:hover { background: var(--accent); color: #1a1f2e; border-color: var(--accent); }
  .en-example {
    color: var(--muted);
    font-size: 0.95rem;
    line-height: 1.6;
    border-left: 3px solid var(--accent);
    padding-left: 12px;
    font-style: italic;
  }

  .lang-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 14px;
  }
  .lang-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 22px;
    position: relative;
    transition: var(--transition);
  }
  .lang-card:hover { transform: translateY(-2px); }
  .lang-label {
    position: absolute;
    top: -10px; left: 14px;
    font-size: 0.65rem;
    font-weight: 800;
    letter-spacing: 1.5px;
    padding: 2px 10px;
    border-radius: 50px;
    color: #fff;
  }
  .lang-card[data-lang="zh"] { border-color: rgba(232,112,64,.35); }
  .lang-card[data-lang="zh"] .lang-label { background: var(--zh); }
  .lang-card[data-lang="ja"] { border-color: rgba(196,80,144,.35); }
  .lang-card[data-lang="ja"] .lang-label { background: var(--ja); }
  .lang-card[data-lang="es"] { border-color: rgba(64,176,112,.35); }
  .lang-card[data-lang="es"] .lang-label { background: var(--es); }
  .native-word { font-size: 1.7rem; margin-bottom: 6px; line-height: 1.3; }
  .lang-card[data-lang="zh"] .native-word,
  .lang-card[data-lang="ja"] .native-word { font-family: 'Noto Sans SC', 'Noto Sans JP', sans-serif; }
  .romanization { color: var(--muted); font-size: 0.88rem; font-style: italic; margin-bottom: 10px; }
  .native-example {
    color: var(--muted);
    font-size: 0.85rem;
    line-height: 1.6;
    border-left: 3px solid;
    padding-left: 10px;
    font-style: italic;
  }
  .lang-card[data-lang="zh"] .native-example { border-color: var(--zh); font-family: 'Noto Sans SC', sans-serif; }
  .lang-card[data-lang="ja"] .native-example { border-color: var(--ja); font-family: 'Noto Sans JP', sans-serif; }
  .lang-card[data-lang="es"] .native-example { border-color: var(--es); }
  .card-speak-row { display: flex; align-items: center; justify-content: flex-end; margin-top: 12px; }

  .error-msg {
    background: rgba(220,60,60,.12);
    border: 1px solid rgba(220,60,60,.3);
    border-radius: var(--radius);
    color: #e88080;
    font-size: 0.9rem;
    padding: 14px 18px;
    text-align: center;
  }
  footer {
    text-align: center;
    color: var(--border);
    font-size: 0.75rem;
    margin-top: 48px;
  }
  @media (max-width: 520px) {
    .lang-grid { grid-template-columns: 1fr; }
    .word-main { font-size: 1.7rem; }
    .search-btn { padding: 14px 16px; font-size: 0.85rem; }
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-row">
      <div class="logo-icon">📖</div>
      <h1>English Language Assistant</h1>
    </div>
    <p class="tagline">Translate, pronounce, and understand English in your language</p>
  </header>

  <div class="direction-bar">
    <button class="dir-btn active" data-dir="en-to-native" onclick="setDirection('en-to-native')">English → My Language</button>
    <button class="dir-btn" data-dir="native-to-en" onclick="setDirection('native-to-en')">My Language → English</button>
  </div>

  <div class="lang-select-row" id="langSelectRow" style="display:none;">
    <span style="color:var(--muted);font-size:.85rem;align-self:center;">My language:</span>
    <button class="lang-chip active" data-lang="zh" onclick="setNativeLang('zh')">🇨🇳 Chinese</button>
    <button class="lang-chip" data-lang="ja" onclick="setNativeLang('ja')">🇯🇵 Japanese</button>
    <button class="lang-chip" data-lang="es" onclick="setNativeLang('es')">🇪🇸 Spanish</button>
  </div>

  <div class="search-box">
    <label class="search-label" id="inputLabel">Enter an English word or phrase</label>
    <div class="search-row">
      <input class="search-input" id="wordInput" type="text" placeholder="e.g. beautiful" autocomplete="off"
        onkeydown="if(event.key==='Enter') doLookup()">
      <button class="search-btn" id="lookupBtn" onclick="doLookup()">Look Up ↵</button>
    </div>
  </div>

  <div class="hints" id="hints">
    <span style="color:var(--muted);font-size:.8rem;">Try:</span>
    <button class="hint-pill" onclick="quickLook('beautiful')">beautiful</button>
    <button class="hint-pill" onclick="quickLook('family')">family</button>
    <button class="hint-pill" onclick="quickLook('hospital')">hospital</button>
    <button class="hint-pill" onclick="quickLook('delicious')">delicious</button>
    <button class="hint-pill" onclick="quickLook('journey')">journey</button>
  </div>

  <div class="status" id="status"></div>
  <div class="results" id="results"></div>

  <footer>Powered by Claude AI · English Language Assistant · For classroom use</footer>
</div>

<script>
  const LANGS = {
    zh: { name:'Chinese (Simplified)', flag:'🇨🇳', label:'CHINESE 中文' },
    ja: { name:'Japanese',             flag:'🇯🇵', label:'JAPANESE 日本語' },
    es: { name:'Spanish',              flag:'🇪🇸', label:'SPANISH' },
  };

  let direction = 'en-to-native';
  let nativeLang = 'zh';

  function setDirection(dir) {
    direction = dir;
    document.querySelectorAll('.dir-btn').forEach(b => b.classList.toggle('active', b.dataset.dir === dir));
    document.getElementById('langSelectRow').style.display = dir === 'native-to-en' ? 'flex' : 'none';
    document.getElementById('inputLabel').textContent =
      dir === 'en-to-native' ? 'Enter an English word or phrase' : 'Enter a word in your language';
    document.getElementById('wordInput').placeholder =
      dir === 'en-to-native' ? 'e.g. beautiful' : 'e.g. 美しい  /  漂亮  /  hermoso';
    document.getElementById('hints').style.display = dir === 'en-to-native' ? 'flex' : 'none';
    clearResults();
  }

  function setNativeLang(lang) {
    nativeLang = lang;
    document.querySelectorAll('.lang-chip').forEach(c => c.classList.toggle('active', c.dataset.lang === lang));
  }

  function clearResults() {
    document.getElementById('results').innerHTML = '';
    document.getElementById('status').innerHTML = '';
  }

  function quickLook(word) {
    document.getElementById('wordInput').value = word;
    doLookup();
  }

  async function doLookup() {
    const query = document.getElementById('wordInput').value.trim();
    if (!query) return;

    const btn = document.getElementById('lookupBtn');
    btn.disabled = true;
    document.getElementById('status').innerHTML = '<span class="spinner"></span> Looking up…';
    document.getElementById('results').innerHTML = '';

    try {
     const response = await fetch('/.netlify/functions/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query, direction, nativeLang })
      });

      if (!response.ok) throw new Error('Server error — please try again');
      const data = await response.json();
      if (data.error) throw new Error(data.error);

      document.getElementById('status').innerHTML = '';
      renderResults(data);
    } catch (e) {
      document.getElementById('status').innerHTML = '';
      document.getElementById('results').innerHTML =
        `<div class="error-msg">Sorry, something went wrong. Please try again.<br><small>${e.message}</small></div>`;
    } finally {
      btn.disabled = false;
    }
  }

  function renderResults(data) {
    const eng = data.english;
    const tr  = data.translations;
    const safeWord = (eng.word || '').replace(/'/g, "\\'");

    let html = `
      <div class="en-card">
        <div class="word-main">${eng.word}</div>
        <div class="pos-badge">${eng.part_of_speech}</div>
        <div class="pronunciation-row">
          <span class="phonetic">${eng.phonetic}</span>
          <button class="speak-btn" title="Hear English" onclick="speak('${safeWord}','en-US')">🔊</button>
        </div>
        <div class="en-example">${eng.example}</div>
      </div>
      <div class="lang-grid">`;

    const voiceMap = { zh:'zh-CN', ja:'ja-JP', es:'es-ES' };
    for (const lang of ['zh','ja','es']) {
      const t = tr[lang];
      if (!t) continue;
      const info = LANGS[lang];
      const safeNative = (t.word || '').replace(/'/g, "\\'");
      html += `
        <div class="lang-card" data-lang="${lang}">
          <div class="lang-label">${info.flag} ${info.label}</div>
          <div class="native-word">${t.word}</div>
          ${t.romanization ? `<div class="romanization">${t.romanization}</div>` : ''}
          <div class="native-example">${t.example}</div>
          <div class="card-speak-row">
            <button class="speak-btn" title="Hear ${info.name}" onclick="speak('${safeNative}','${voiceMap[lang]}')">🔊</button>
          </div>
        </div>`;
    }
    html += '</div>';
    document.getElementById('results').innerHTML = html;
  }

  function speak(text, lang) {
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = lang;
    u.rate = 0.9;
    window.speechSynthesis.speak(u);
  }
</script>
</body>
</html>
